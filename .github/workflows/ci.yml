name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Configure (CMake preset)
        run: cmake --preset linux-debug

      - name: Build (CMake preset)
        run: cmake --build --preset build-linux-debug

      - name: Run tests
        run: ctest --test-dir out/build/linux-debug --output-on-failure